<h2 mat-dialog-title>{{ isEdit ? 'Edit Announcement' : 'Post Announcement' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" placeholder="Announcement title" />
      <mat-error *ngIf="form.get('title')?.hasError('required')">Title is required</mat-error>
      <mat-error *ngIf="form.get('title')?.hasError('maxlength')">Max 100 characters</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Message</mat-label>
      <textarea matInput formControlName="message" placeholder="Write your announcement..." rows="6"></textarea>
      <mat-error *ngIf="form.get('message')?.hasError('required')">Message is required</mat-error>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid || saving">
    {{ saving ? 'Saving...' : (isEdit ? 'Update' : 'Post') }}
  </button>
</mat-dialog-actions>

<style>
  .dialog-form { display: flex; flex-direction: column; gap: 8px; padding-top: 8px; min-width: 440px; }
  .full-width { width: 100%; }
</style>
