<div class="announcements-container">
  <div class="page-header">
    <h2 class="page-title">Announcements</h2>
    <button mat-raised-button color="primary" *ngIf="authService.isAdmin()" (click)="openAdd()">
      <mat-icon>add</mat-icon> Post Announcement
    </button>
  </div>

  <div *ngIf="loading" class="loading-center"><mat-spinner diameter="40"></mat-spinner></div>

  <div *ngIf="!loading && announcements.length === 0" class="no-data">
    <mat-icon class="no-data-icon">campaign</mat-icon>
    <p>No announcements yet.</p>
  </div>

  <div class="announcements-list" *ngIf="!loading">
    <mat-card *ngFor="let a of announcements" class="announcement-card" [class.inactive]="!a.isActive">
      <mat-card-header>
        <mat-card-title>{{ a.title }}</mat-card-title>
        <mat-card-subtitle>{{ a.createdOn | date:'dd MMM yyyy, h:mm a' }}</mat-card-subtitle>
        <span class="spacer"></span>
        <span class="status-chip" [class.active]="a.isActive" [class.inactive]="!a.isActive">
          {{ a.isActive ? 'Active' : 'Inactive' }}
        </span>
      </mat-card-header>

      <mat-card-content>
        <p class="announcement-message">{{ a.message }}</p>
      </mat-card-content>

      <mat-card-actions align="end" *ngIf="authService.isAdmin()">
        <button mat-icon-button color="primary" (click)="openEdit(a)" title="Edit">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="accent" *ngIf="a.isActive" (click)="deactivate(a)" title="Deactivate">
          <mat-icon>visibility_off</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="delete(a)" title="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
