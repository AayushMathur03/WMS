<div class="departments-container">
  <div class="page-header">
    <h2 class="page-title">Departments</h2>
    <button mat-raised-button color="primary" *ngIf="authService.isAdmin()" (click)="openAdd()">
      <mat-icon>add</mat-icon> Add Department
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <div *ngIf="loading" class="loading-center"><mat-spinner diameter="40"></mat-spinner></div>

      <table mat-table [dataSource]="departments" class="full-width" *ngIf="!loading">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Department Name</th>
          <td mat-cell *matCellDef="let d">{{ d.departmentName }}</td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let d">{{ d.description ?? '-' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let d">
            <button mat-icon-button color="primary" *ngIf="authService.isAdmin()" (click)="openEdit(d)" title="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" *ngIf="authService.isAdmin()" (click)="delete(d)" title="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell no-data" colspan="3">No departments found.</td>
        </tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
