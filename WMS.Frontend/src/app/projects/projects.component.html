<div class="projects-container">
  <div class="page-header">
    <h2 class="page-title">Projects</h2>
    <button mat-raised-button color="primary" *ngIf="authService.isAdmin()" (click)="openAdd()">
      <mat-icon>add</mat-icon> Add Project
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <div *ngIf="loading" class="loading-center"><mat-spinner diameter="40"></mat-spinner></div>

      <table mat-table [dataSource]="projects" class="full-width" *ngIf="!loading">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Project Name</th>
          <td mat-cell *matCellDef="let p">{{ p.projectName }}</td>
        </ng-container>

        <ng-container matColumnDef="client">
          <th mat-header-cell *matHeaderCellDef>Client</th>
          <td mat-cell *matCellDef="let p">{{ p.clientName ?? '-' }}</td>
        </ng-container>

        <ng-container matColumnDef="start">
          <th mat-header-cell *matHeaderCellDef>Start Date</th>
          <td mat-cell *matCellDef="let p">{{ p.startDate ? (p.startDate | date:'dd MMM yyyy') : '-' }}</td>
        </ng-container>

        <ng-container matColumnDef="end">
          <th mat-header-cell *matHeaderCellDef>End Date</th>
          <td mat-cell *matCellDef="let p">{{ p.endDate ? (p.endDate | date:'dd MMM yyyy') : '-' }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let p">
            <span class="status-chip" [class.active]="p.status === 'Active'" [class.completed]="p.status === 'Completed'">
              {{ p.status }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let p">
            <button mat-icon-button color="accent" (click)="openAssign(p)" title="Assign Employee">
              <mat-icon>person_add</mat-icon>
            </button>
            <button mat-icon-button color="primary" *ngIf="authService.isManagerOrAdmin()" (click)="openEdit(p)" title="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" *ngIf="authService.isAdmin()" (click)="delete(p)" title="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell no-data" colspan="6">No projects found.</td>
        </tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
