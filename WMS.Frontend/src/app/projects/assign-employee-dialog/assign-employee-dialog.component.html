<h2 mat-dialog-title>Assign Employee to {{ project.projectName }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="form-grid">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Select Employee</mat-label>
      <mat-select formControlName="empId">
        <mat-option *ngFor="let e of employees" [value]="e.employeeId">{{ e.fullName }}</mat-option>
      </mat-select>
      <mat-error>Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Assigned On</mat-label>
      <input matInput [matDatepicker]="assignPicker" formControlName="assignedOn" />
      <mat-datepicker-toggle matSuffix [for]="assignPicker"></mat-datepicker-toggle>
      <mat-datepicker #assignPicker></mat-datepicker>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="saving">Assign</button>
</mat-dialog-actions>
